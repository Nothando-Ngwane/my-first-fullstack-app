<!DOCTYPE html>
<html>
<head>
    <title>Nothando's Task Manager</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        button { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>
        <input type="text" placeholder="Enter a new task...">
        <button>Add Task</button>
        <ul>
            <li>Finish GitHub Profile ✅</li>
            <li>Build my first Python app 🚀</li>
        </ul>
    </div>
</body>
</html>
